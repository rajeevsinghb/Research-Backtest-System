name: Run Research System

# ─────────────────────────────────────────────────────────────
# HOW TO USE:
#   1. Edit main.py CONFIG block on GitHub (pencil icon)
#   2. Commit changes
#   3. Actions tab → Run Research System → Run workflow
#
# All parameters are controlled from main.py CONFIG.
# See WORKFLOW_GUIDE.md for parameter reference.
# ─────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python main.py

      - name: Commit and push data + outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          [ -d outputs ] && git add outputs/ || true
          git diff --cached --quiet || git commit -m "Research run: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
